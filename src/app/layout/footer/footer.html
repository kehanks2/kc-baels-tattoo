<footer class="footer" aria-label="Site footer">
  <div class="footer__inner container">

    <div class="footer__brand">
      <a class="footer__logo" routerLink="/" aria-label="Baels Tattoo — Home">Baels</a>
      <p class="footer__tagline">Tattoo Artist · Austin, TX</p>
      <p class="footer__studio">
        Located at
        <a
          href="https://www.flyingtigertattoo.com/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Flying Tiger Tattoo website (opens in new tab)"
        >Flying Tiger Tattoo</a>
        &middot;
        <a
          href="https://instagram.com/flyingtigertattooatx"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Flying Tiger Tattoo on Instagram (opens in new tab)"
        >&#64;flyingtigertattooatx</a>
      </p>
    </div>

    <nav class="footer__nav" aria-label="Footer navigation">
      <ul role="list">
        <li><a routerLink="/portfolio">Portfolio</a></li>
        <li><a routerLink="/about">About</a></li>
        <li><a routerLink="/booking">Booking</a></li>
        <li><a routerLink="/faq">FAQ</a></li>
        <li><a routerLink="/contact">Contact</a></li>
      </ul>
    </nav>

    <div class="footer__social">
      <a
        href="https://instagram.com/baelstattoos"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Follow Baels on Instagram (opens in new tab)"
        class="footer__social-link"
      >
        <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
        </svg>
        Instagram
      </a>
      <a
        href="https://www.facebook.com/baelstattoos/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Follow Baels on Facebook (opens in new tab)"
        class="footer__social-link"
      >
        <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
        </svg>
        Facebook
      </a>
      <a
        href="https://www.tiktok.com/@baelstattoos"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Follow Baels on TikTok (opens in new tab)"
        class="footer__social-link"
      >
        <svg aria-hidden="true" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/>
        </svg>
        TikTok
      </a>
    </div>
  </div>

  <div class="footer__bottom container">
    <p class="footer__copy">&copy; {{ year }} Baels Tattoo. All rights reserved.</p>
    <p class="footer__location">Austin, Texas</p>
  </div>
</footer>
