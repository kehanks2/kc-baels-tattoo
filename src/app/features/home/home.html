<app-hero />

<!-- ── Featured Work Strip ──────────────────────────────────────────────── -->
<section class="section featured-strip" aria-labelledby="featured-heading">
  <div class="container">
    <app-section-header label="Selected Work" title="Recent Pieces" headingId="featured-heading" />
    <div class="featured-strip__grid">
      @for (item of featuredItems(); track item.id) {
        <a routerLink="/portfolio" class="featured-strip__item" [attr.aria-label]="item.alt">
          <img [ngSrc]="item.src" [alt]="item.alt" fill />
        </a>
      }
    </div>
    <div class="featured-strip__cta">
      <a class="btn btn-outline" routerLink="/portfolio">View Full Portfolio</a>
    </div>
  </div>
</section>

<!-- ── About Preview ────────────────────────────────────────────────────── -->
<section class="section about-preview" aria-labelledby="about-heading">
  <div class="container about-preview__grid">
    <div class="about-preview__image-col" aria-hidden="true">
      <!-- Replace with NgOptimizedImage once asset exists -->
      <div class="about-preview__image-placeholder"></div>
    </div>
    <div class="about-preview__text-col">
      <app-section-header label="The Artist" title="KC Baels" headingId="about-heading" />
      <p>
        Based in Pflugerville, TX, KC Baels creates custom tattoos rooted in
        intentional design. Every session starts with a conversation — because
        the best ink comes from actually knowing your story.
      </p>
      <a class="btn btn-outline" routerLink="/about">Learn More</a>
    </div>
  </div>
</section>

<!-- ── Booking CTA ──────────────────────────────────────────────────────── -->
<section class="section booking-cta" aria-labelledby="booking-heading">
  <div class="container booking-cta__inner">
    <app-section-header label="Ready?" title="Start Your Custom Piece" headingId="booking-heading" />
    <a class="btn btn-primary" routerLink="/booking">Book an Appointment</a>
  </div>
</section>
