<div
  class="backdrop"
  role="dialog"
  aria-modal="true"
  aria-label="Image lightbox"
  (click)="onBackdropClick($event)"
>
  <!-- Close -->
  <button class="close-btn" (click)="close()" aria-label="Close lightbox">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
      <path d="M2 2L16 16M16 2L2 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>

  @if (current(); as item) {
    <div class="stage">
      <!-- Prev -->
      @if (items().length > 1) {
        <button class="nav-btn" (click)="prev()" aria-label="Previous image">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M13 4L7 10L13 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      }

      <!-- Image + caption -->
      <div class="content">
        <div class="image-wrap">
          <img [ngSrc]="item.src" [alt]="item.alt" [width]="item.width" [height]="item.height" priority />
        </div>
        <div class="caption">
          @if (item.title) {
            <p class="caption-title">{{ item.title }}</p>
          }
          <p class="caption-category">{{ categoryLabels[item.category] }}</p>
          @if (items().length > 1) {
            <p class="caption-counter">{{ currentIndex() + 1 }} / {{ items().length }}</p>
          }
        </div>
      </div>

      <!-- Next -->
      @if (items().length > 1) {
        <button class="nav-btn" (click)="next()" aria-label="Next image">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M7 4L13 10L7 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      }
    </div>
  }
</div>
