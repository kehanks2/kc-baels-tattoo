spring:
  application:
    name: KC Baels API
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:kcbaels}
    username: ${PGUSER:${DB_USER:kcbaels}}
    password: ${PGPASSWORD:${DB_PASS:kcbaels}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:smtp.sendgrid.net}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:apikey}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

mail:
  from: ${MAIL_FROM:noreply@kcbaelstattoo.com}
  owner: ${OWNER_EMAIL:}
