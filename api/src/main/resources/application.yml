spring:
  application:
    name: KC Baels API
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:kcbaels}
    username: ${PGUSER:${DB_USER:kcbaels}}
    password: ${PGPASSWORD:${DB_PASS:kcbaels}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

mail:
  api-key: ${SENDGRID_API_KEY:}
  from: ${MAIL_FROM:noreply@heybaels.com}
  owner: ${OWNER_EMAIL:}
