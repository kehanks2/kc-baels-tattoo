services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kcbaels
      POSTGRES_USER: kcbaels
      POSTGRES_PASSWORD: kcbaels
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kcbaels"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
